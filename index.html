<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>海事法規、外來信息辨識和執行追蹤系統</title>
  
  <!-- 載入 React 核心 -->
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"
    onerror="this.onerror=null;this.src='https://unpkg.com/react@18/umd/react.production.min.js';"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"
    onerror="this.onerror=null;this.src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js';"></script>

  <!-- Tailwind CSS：先設定 config，再載入套件；若載入失敗，系統仍可顯示文字內容 -->
  <script>
    window.tailwind = window.tailwind || {};
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            darkbg: '#0F172A', 
            darkcard: '#1E293B' 
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Excel 匯出套件；若載入失敗，只會影響匯出 Excel，不影響主畫面 -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"
    onerror="this.onerror=null;this.src='https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.min.js';"></script>

  <!-- PDF 文字提取：用於 PDF 導入頁；若載入失敗，仍可人工貼上或記錄 PDF URL -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"
    onerror="console.warn('pdf.js 載入失敗，PDF 自動讀取將不可用');"></script>

  <!-- Supabase：GitHub Pages 靜態發布時使用 Supabase Auth / Database 做權限、雲端資料與可查詢 LOG -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    onerror="console.warn('Supabase SDK 載入失敗，系統將降級為本地模式');"></script>
  <script src="./supabase-config.js"
    onerror="console.warn('supabase-config.js 未找到；可在管理頁貼上 Supabase URL 與 anon key 後使用本機暫存配置。');"></script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei', 'PingFang TC'; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* Dashboard 動畫 */
    .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .gauge-circle { transition: stroke-dashoffset 1s ease-out; }
    .hover-scale { transition: transform 0.2s; cursor: pointer; }
    .hover-scale:hover { transform: scale(1.02); z-index: 10; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    
    /* 富文本編輯器 Placeholder 效果 */
    [contenteditable][data-placeholder]:empty:before {
        content: attr(data-placeholder);
        color: #94a3b8; /* Tailwind slate-400 */
        pointer-events: none;
        display: block; 
    }
    
    /* 列印專屬樣式設定 */
    @media print { 
      body { background-color: white !important; } 
      .no-print { display: none !important; } 
      .print-avoid-break { page-break-inside: avoid !important; break-inside: avoid !important; } 
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color: black !important; } 
      ::-webkit-scrollbar { display: none !important; }
      table.min-w-\[1200px\] { min-width: 0 !important; width: 100% !important; table-layout: auto !important; }
      th, td { white-space: normal !important; word-wrap: break-word !important; }
    }
  </style>

  <style id="readability-fix">
    /* ===== 可讀性強化：避免 Tailwind CDN 或動態 class 未完整生效時出現白字/灰字看不清 ===== */
    :root {
      --clear-text: #0f172a;
      --muted-text: #334155;
      --soft-text: #475569;
      --clear-bg: #f1f5f9;
      --card-bg: #ffffff;
      --card-soft-bg: #f8fafc;
      --border-clear: #cbd5e1;
      --header-bg: #0f172a;
      --header-text: #ffffff;
    }

    body {
      background-color: var(--clear-bg) !important;
      color: var(--clear-text) !important;
    }

    header,
    .bg-blue-900,
    .bg-emerald-900,
    .bg-indigo-900,
    .bg-rose-900,
    .bg-slate-900 {
      background-color: var(--header-bg) !important;
      color: var(--header-text) !important;
    }

    header *,
    header .text-white {
      color: var(--header-text) !important;
    }

    .bg-white,
    .bg-slate-50,
    .bg-slate-100 {
      color: var(--clear-text) !important;
    }

    .bg-white {
      background-color: var(--card-bg) !important;
    }

    .bg-slate-50 {
      background-color: var(--card-soft-bg) !important;
    }

    .bg-slate-100 {
      background-color: #f1f5f9 !important;
    }

    .bg-slate-200 {
      background-color: #e2e8f0 !important;
    }

    .text-slate-900,
    .text-slate-800,
    .text-slate-700,
    .text-slate-600,
    .text-slate-500,
    .text-gray-900,
    .text-gray-800,
    .text-gray-700,
    .text-gray-600,
    .text-gray-500 {
      color: var(--clear-text) !important;
    }

    .text-slate-400,
    .text-gray-400 {
      color: var(--soft-text) !important;
    }

    input,
    textarea,
    select,
    [contenteditable="true"],
    [contenteditable=""] {
      color: var(--clear-text) !important;
      background-color: #ffffff !important;
      border-color: var(--border-clear) !important;
    }

    input::placeholder,
    textarea::placeholder,
    [data-placeholder]:empty:before {
      color: #64748b !important;
    }

    table,
    th,
    td {
      color: var(--clear-text) !important;
    }

    /* 主要彩色按鈕維持白字深底，避免白字落在白底 */
    .bg-blue-600,
    .bg-blue-700,
    .bg-emerald-600,
    .bg-emerald-700,
    .bg-indigo-600,
    .bg-indigo-700,
    .bg-rose-600,
    .bg-rose-700,
    .bg-slate-700,
    .bg-slate-800 {
      color: #ffffff !important;
    }

    .bg-blue-600 { background-color: #2563eb !important; }
    .bg-blue-700 { background-color: #1d4ed8 !important; }
    .bg-emerald-600 { background-color: #059669 !important; }
    .bg-emerald-700 { background-color: #047857 !important; }
    .bg-indigo-600 { background-color: #4f46e5 !important; }
    .bg-indigo-700 { background-color: #4338ca !important; }
    .bg-rose-600 { background-color: #e11d48 !important; }
    .bg-rose-700 { background-color: #be123c !important; }
    .bg-slate-700 { background-color: #334155 !important; }
    .bg-slate-800 { background-color: #1e293b !important; }

    /* 標籤色塊：背景淡、文字深，列印和螢幕都清楚 */
    .bg-red-100 { background-color: #fee2e2 !important; }
    .text-red-800, .text-red-500 { color: #991b1b !important; }

    .bg-orange-100 { background-color: #ffedd5 !important; }
    .text-orange-800 { color: #9a3412 !important; }

    .bg-amber-100 { background-color: #fef3c7 !important; }
    .text-amber-800 { color: #92400e !important; }

    .bg-emerald-100 { background-color: #d1fae5 !important; }
    .text-emerald-800 { color: #065f46 !important; }

    .bg-purple-100 { background-color: #f3e8ff !important; }
    .text-purple-800 { color: #6b21a8 !important; }

    .bg-blue-100 { background-color: #dbeafe !important; }
    .text-blue-800, .text-blue-600 { color: #1e40af !important; }

    /* 深色模式：同樣保持高對比 */
    html.dark body {
      background-color: #0f172a !important;
      color: #e2e8f0 !important;
    }

    html.dark .bg-white,
    html.dark .bg-slate-50,
    html.dark .bg-slate-100,
    html.dark .dark\:bg-darkcard,
    html.dark .dark\:bg-slate-800 {
      background-color: #1e293b !important;
      color: #e2e8f0 !important;
    }

    html.dark .text-slate-900,
    html.dark .text-slate-800,
    html.dark .text-slate-700,
    html.dark .text-slate-600,
    html.dark .text-slate-500,
    html.dark .text-slate-400,
    html.dark .dark\:text-slate-100,
    html.dark .dark\:text-slate-300,
    html.dark .dark\:text-slate-400 {
      color: #e2e8f0 !important;
    }

    html.dark input,
    html.dark textarea,
    html.dark select,
    html.dark [contenteditable="true"],
    html.dark [contenteditable=""] {
      background-color: #0f172a !important;
      color: #e2e8f0 !important;
      border-color: #475569 !important;
    }

    html.dark table,
    html.dark th,
    html.dark td {
      color: #e2e8f0 !important;
    }
  </style>


  <style id="dropdown-and-icon-fix">
    /* ===== 下拉選單與「新增」圖示修正 =====
       上一版為了避免白屏灰字，對 header * 做了強制白字。
       這會影響 header 裡面的白底下拉選單與「新增」白底按鈕，所以這裡做更精準的覆蓋。
    */

    /* 所有原生下拉選單與 option，強制白底黑字 */
    select,
    select option,
    select optgroup {
      color: #0f172a !important;
      background-color: #ffffff !important;
    }

    /* 所有自製下拉選單：白底深色字，避免被外層 header 白字繼承 */
    div.absolute[class*="bg-white"],
    div.absolute[class*="bg-white"] *,
    div.absolute[class*="dark:bg-darkcard"],
    div.absolute[class*="dark:bg-darkcard"] *,
    [class*="absolute"][class*="bg-white"],
    [class*="absolute"][class*="bg-white"] *,
    [class*="absolute"][class*="dark:bg-darkcard"],
    [class*="absolute"][class*="dark:bg-darkcard"] * {
      color: #0f172a !important;
    }

    div.absolute[class*="bg-white"],
    div.absolute[class*="dark:bg-darkcard"],
    [class*="absolute"][class*="bg-white"],
    [class*="absolute"][class*="dark:bg-darkcard"] {
      background-color: #ffffff !important;
    }

    /* 下拉選單內的小圓點/色塊仍保留背景色，但文字與圖示用深色 */
    div.absolute svg,
    [class*="absolute"] svg {
      color: #0f172a !important;
      stroke: currentColor !important;
    }

    /* Header 只讓標題與透明按鈕保持白字，不再污染白底下拉選單 */
    header {
      background-color: #0f172a !important;
      color: #ffffff !important;
    }

    header h1,
    header h1 + div {
      color: #ffffff !important;
    }

    header button:not(.bg-white):not([class*="bg-white"]) {
      color: #ffffff !important;
    }

    header button:not(.bg-white):not([class*="bg-white"]) svg {
      color: #ffffff !important;
      stroke: currentColor !important;
    }

    /* Header 裡的「新增」白底按鈕：深色字與深色加號，確保清楚 */
    header button.bg-white,
    header button.bg-white *,
    header button[class*="bg-white"],
    header button[class*="bg-white"] * {
      color: #0f172a !important;
      stroke: currentColor !important;
    }

    header button.bg-white svg,
    header button[class*="bg-white"] svg {
      color: #0f172a !important;
      stroke: currentColor !important;
    }

    /* 「新增法規」彈窗上方色塊與關閉/加號圖示保持白字白線 */
    .fixed .rounded-t-3xl,
    .fixed .rounded-t-3xl * {
      color: #ffffff !important;
      stroke: currentColor !important;
    }

    /* 但彈窗內容區、下拉選單、輸入欄位全部強制深色字 */
    .fixed .p-8,
    .fixed .p-8 *,
    .fixed input,
    .fixed textarea,
    .fixed select,
    .fixed option,
    .fixed [contenteditable] {
      color: #0f172a !important;
    }

    .fixed input,
    .fixed textarea,
    .fixed select,
    .fixed [contenteditable] {
      background-color: #ffffff !important;
    }

    /* 上傳文件、附件新增等白底/淡底按鈕的圖形強制深色 */
    label[for^="upload"],
    label[for^="upload"] *,
    label[for^="upload"] svg,
    label[for="upload-new-task"],
    label[for="upload-new-task"] *,
    label[for="upload-new-task"] svg {
      color: #0f172a !important;
      stroke: currentColor !important;
    }

    /* 若使用深色模式，也讓下拉選單保持白底黑字，避免系統色反轉造成不清楚 */
    html.dark select,
    html.dark select option,
    html.dark select optgroup,
    html.dark div.absolute[class*="bg-white"],
    html.dark div.absolute[class*="dark:bg-darkcard"],
    html.dark [class*="absolute"][class*="bg-white"],
    html.dark [class*="absolute"][class*="dark:bg-darkcard"] {
      color: #0f172a !important;
      background-color: #ffffff !important;
    }

    html.dark div.absolute[class*="bg-white"] *,
    html.dark div.absolute[class*="dark:bg-darkcard"] *,
    html.dark [class*="absolute"][class*="bg-white"] *,
    html.dark [class*="absolute"][class*="dark:bg-darkcard"] * {
      color: #0f172a !important;
    }
  </style>


  <style id="header-controls-final-fix">
    /* ===== Header 按鈕與主題/分類控制最終修正 =====
       關鍵：不能用 [class*="bg-white"] 來判斷白底按鈕，
       因為 hover:bg-white/20、bg-white/10 也會被誤判，導致匯入/匯出/PDF/主題等按鈕變成深色看不清。
    */

    /* Header 本體保持深色 */
    header {
      background-color: #0f172a !important;
      color: #ffffff !important;
    }

    header h1,
    header h1 + div {
      color: #ffffff !important;
    }

    /* Header 裡所有普通按鈕預設白字白圖示 */
    header button,
    header button span,
    header button svg {
      color: #ffffff !important;
      stroke: currentColor !important;
    }

    /* Header 裡真正白底的「新增」按鈕，才使用深色文字與深色加號 */
    header button.bg-white,
    header button.bg-white span,
    header button.bg-white svg {
      color: #0f172a !important;
      stroke: currentColor !important;
    }

    /* Header 內的白底下拉選單：整個選單與選項改回深色文字 */
    header .absolute,
    header .absolute *,
    header div[class*="absolute"],
    header div[class*="absolute"] *,
    header div[class*="bg-white"],
    header div[class*="bg-white"] * {
      color: #0f172a !important;
      stroke: currentColor !important;
    }

    header .absolute,
    header div[class*="absolute"] {
      background-color: #ffffff !important;
    }

    /* 但不要把下拉選單裡的色彩圓點塗掉，只控制文字/圖示可讀性 */
    header .absolute span[class*="bg-"],
    header div[class*="absolute"] span[class*="bg-"] {
      color: transparent !important;
    }

    /* 匯入 / Excel匯出 / PDF列印這類半透明深色按鈕，強制白字白圖示 */
    header button[class*="bg-white/"],
    header button[class*="bg-white/"] *,
    header button[class*="hover:bg-white/"],
    header button[class*="hover:bg-white/"] *,
    header button[class*="border-white/"],
    header button[class*="border-white/"] * {
      color: #ffffff !important;
      stroke: currentColor !important;
    }

    /* 分隔線 */
    header .bg-white\/30,
    header [class*="bg-white/30"] {
      background-color: rgba(255,255,255,0.35) !important;
    }

    /* 原生 select 與 option 保持白底黑字 */
    select,
    select option,
    select optgroup {
      color: #0f172a !important;
      background-color: #ffffff !important;
    }

    /* 非 Header 區域的自製下拉選單，仍然白底黑字 */
    body div.absolute:not(header div),
    body div.absolute:not(header div) *,
    body [class*="absolute"]:not(header [class*="absolute"]),
    body [class*="absolute"]:not(header [class*="absolute"]) * {
      color: #0f172a !important;
      stroke: currentColor !important;
    }

    body div.absolute:not(header div),
    body [class*="absolute"]:not(header [class*="absolute"]) {
      background-color: #ffffff !important;
    }
  </style>


  <style id="layout-visual-polish-fix">
    /* ===== Dashboard 進度環、已完成顏色、滑鼠 hover 底色微調 ===== */

    /* Dashboard 進度環：加大尺寸並增加留白，避免看起來太小 */
    svg:has(.gauge-circle) {
      width: 80px !important;
      height: 80px !important;
      min-width: 80px !important;
      min-height: 80px !important;
    }

    div:has(> svg .gauge-circle) {
      width: 80px !important;
      height: 80px !important;
      min-width: 80px !important;
      min-height: 80px !important;
    }

    svg:has(.gauge-circle) + span {
      font-size: 18px !important;
      font-weight: 800 !important;
      color: #047857 !important;
    }

    .gauge-circle {
      stroke: #059669 !important;
    }

    /* Dashboard 已結案數字：用沉穩綠，不用過亮的螢光綠 */
    .text-emerald-600,
    .text-emerald-500,
    .text-teal-700 {
      color: #047857 !important;
    }

    /* 已完成狀態：改成沉穩 teal，圖示不再使用奇怪的淡綠填色 */
    tbody.print-avoid-break td:first-child .text-teal-700,
    tbody.print-avoid-break td:first-child .text-emerald-600,
    tbody.print-avoid-break td:first-child .dark\:text-emerald-400 {
      color: #0f766e !important;
    }

    tbody.print-avoid-break td:first-child svg {
      color: #0f766e !important;
      stroke: currentColor !important;
    }

    tbody.print-avoid-break td:first-child svg.fill-transparent,
    tbody.print-avoid-break td:first-child svg[class*="fill-transparent"] {
      fill: transparent !important;
    }

    /* 已完成行：背景只用非常淡的綠，不要整塊顏色怪怪的 */
    tbody.print-avoid-break > tr[class*="bg-emerald"] {
      background-color: #f0fdfa !important;
    }

    tbody.print-avoid-break > tr[class*="bg-emerald"]:hover {
      background-color: #e6fffb !important;
    }

    /* 一般行 hover：原本灰色太重，改成很淡的藍灰 */
    tbody.print-avoid-break > tr:hover,
    tr[class*="hover:bg-slate"]:hover,
    tr[class*="dark:hover:bg-slate"]:hover {
      background-color: #f8fafc !important;
    }

    /* 展開詳情行：不再使用深灰底，改為清爽淡底 */
    tbody.print-avoid-break > tr:nth-child(2),
    tr[class*="bg-slate-100"],
    tr[class*="dark:bg-[#161F33]"] {
      background-color: #f8fafc !important;
    }

    tbody.print-avoid-break > tr:nth-child(2):hover,
    tr[class*="bg-slate-100"]:hover,
    tr[class*="dark:bg-[#161F33]"]:hover {
      background-color: #f8fafc !important;
    }

    /* 展開內容區塊保持白底或極淡底，輸入框仍清楚 */
    tbody.print-avoid-break > tr:nth-child(2) td {
      background-color: #f8fafc !important;
      color: #0f172a !important;
    }

    tbody.print-avoid-break > tr:nth-child(2) input,
    tbody.print-avoid-break > tr:nth-child(2) textarea,
    tbody.print-avoid-break > tr:nth-child(2) [contenteditable] {
      background-color: #ffffff !important;
      color: #0f172a !important;
    }

    /* 分類標籤 hover 也不要變成重灰 */
    div[class*="hover:bg-slate-300"]:hover,
    div[class*="dark:hover:bg-slate-600"]:hover,
    label[class*="hover:bg-slate"]:hover,
    div[class*="hover:bg-slate"]:hover {
      background-color: #e2e8f0 !important;
      color: #0f172a !important;
    }

    /* 已完成小卡/實際完成日區塊：顏色統一 */
    .bg-emerald-100,
    [class*="bg-emerald-100"] {
      background-color: #ccfbf1 !important;
    }

    .border-emerald-300,
    [class*="border-emerald-300"] {
      border-color: #5eead4 !important;
    }

    .text-emerald-800,
    .text-emerald-900,
    [class*="text-emerald-800"],
    [class*="text-emerald-900"] {
      color: #134e4a !important;
    }
  </style>


  <style id="gauge-size-and-label-fix">
    /* ===== 進度環尺寸與百分比重疊修正 ===== */
    svg:has(.gauge-circle) {
      width: 112px !important;
      height: 112px !important;
      min-width: 112px !important;
      min-height: 112px !important;
      display: block !important;
    }

    div:has(> svg .gauge-circle) {
      width: 112px !important;
      height: 112px !important;
      min-width: 112px !important;
      min-height: 112px !important;
      position: relative !important;
      display: flex !important;
      align-items: center !important;

  <script>

        '<p style="margin:0;color:#64748b;font-size:13px;">建議：使用 Chrome/Edge 直接開啟，不要使用郵件、微信或 Line 的內建預覽；必要時按 F12 → Console 查看紅色錯誤。</p>';
    };
    window.addEventListener('error', function(e) {
      if (document.getElementById('boot-fallback')) {

                const pushDate = (y, m, d) => {
                    const yy = Number(y), mm = Number(m), dd = Number(d);
                    if (yy >= 2020 && yy <= 2045 && mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) dateCandidates.push(`${yy}-${String(mm).padStart(2, '0')}-${String(dd).padStart(2, '0')}`);
                };
                [...clean.matchAll(/(20\d{2})[-/.年]\s*(\d{1,2})[-/.月]\s*(\d{1,2})/g)].forEach(m => pushDate(m[1], m[2], m[3]));
                [...clean.matchAll(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+(20\d{2})/gi)].forEach(m => {
                    const months = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
                    pushDate(m[3], months[m[2].slice(0,3).toLowerCase()], m[1]);
                });
                const refMatches = [...clean.matchAll(/\b(?:MSC|MEPC|A|BWM|FAL|LEG|MSC-MEPC|Res\.?|Resolution|Circular|Circ\.?|MEPC\.\d+\(\d+\)|MSC\.\d+\(\d+\))[\w.()\/\-]+/gi)].map(m => m[0]);
                const noticeMatches = [...clean.matchAll(/(?:通函|公告|通知|決議|決議案|修正案|規則|指南|指引|Circular|Notice|Resolution)\s*[A-Z0-9.()\/-]{2,}/gi)].map(m => m[0]);
                const regions = [];
                if (/global|worldwide|international|imo|全球|國際/.test(lower)) regions.push('全球');
                if (/european union|\beu\b|歐盟|eur-lex/.test(lower)) regions.push('歐盟 (EU)');
                if (/united states|\busa\b|uscg|美國/.test(lower)) regions.push('美國 (USA)');
                if (/uk|united kingdom|英國/.test(lower)) regions.push('英國 (UK)');
                if (/china|中國/.test(lower)) regions.push('中國 (China)');
                if (/singapore|新加坡/.test(lower)) regions.push('新加坡 (Singapore)');
                const shipTypes = [];
                if (/all ships|all vessels|所有船|全部船/.test(lower)) shipTypes.push('所有船舶');
                if (/container|貨櫃/.test(lower)) shipTypes.push('貨櫃船');
                if (/bulk|散裝/.test(lower)) shipTypes.push('散裝船');
                if (/lng|lpg|gas carrier|液化氣/.test(lower)) shipTypes.push('液化氣船');
                if (/passenger|客船/.test(lower)) shipTypes.push('客船');
                if (/tanker|油輪/.test(lower)) shipTypes.push('油輪');
                if (/ro-?ro/.test(lower)) shipTypes.push('Ro-Ro');
                const departments = [];
                if (/engine|machinery|fuel|燃油|機艙|輪機|設備/.test(lower)) departments.push('輪機部');
                if (/navigation|chart|route|航行|航海|駕駛/.test(lower)) departments.push('航海部');
                if (/crew|seafarer|manning|船員|培訓|休息/.test(lower)) departments.push('船員部');
                if (/safety|ism|audit|psc|port state|安全|檢查|滯留/.test(lower)) departments.push('安全部');
                if (/environment|emission|carbon|環保|排放|碳/.test(lower)) departments.push('環保部');
                return {
                    effectiveDate: dateCandidates[0] || '',
                    references: [...new Set([...refMatches, ...noticeMatches])].slice(0, 5),
                    regions: [...new Set(regions.length ? regions : ['全球'])],
                    shipTypes: [...new Set(shipTypes.length ? shipTypes : ['所有船舶'])],
                    departments: [...new Set(departments)],
                    requiresMoc: /management of change|\bmoc\b|改造|改裝|設備更換|系統變更|程序變更|software update|硬體|新設備/.test(lower)
                };
            };
            const splitImportedTextIntoItems = (text, maxItems = 12) => {
                const raw = String(text || '').replace(/\r/g, '\n');
                const normalized = raw.replace(/[ \t]+/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
                if (!normalized) return [];
                const chunks = [];
                const pushChunk = (chunk) => {
                    const clean = chunk.replace(/\n{3,}/g, '\n\n').trim();
                    if (clean.length >= 80 && !chunks.some(x => normalizeImportKey(x).slice(0, 120) === normalizeImportKey(clean).slice(0, 120))) chunks.push(clean);
                };
                if (/--- Page \d+ ---/.test(normalized)) {
                    normalized.split(/--- Page \d+ ---/).forEach(pushChunk);
                }
                if (chunks.length < 2) {
                    normalized.split(/\n(?=(?:\d+\.|\d+\)|[A-Z]\.|第[一二三四五六七八九十]+[、章節]|[•●▪-]\s+|(?:MSC|MEPC|IMO|USCG|EU|ClassNK|DNV|ABS)\b))/g).forEach(pushChunk);
                }
                if (chunks.length < 2) {
                    normalized.split(/\n(?=.{8,120}(?:Circular|Resolution|Notice|Guideline|Amendment|通函|決議|公告|修正案|指南|指引|規則))/gi).forEach(pushChunk);
                }
                if (chunks.length < 2) {
                    const sentences = normalized.split(/(?<=[。.!?])\s+/).filter(Boolean);
                    let buffer = '';
                    sentences.forEach(sentence => {
                        buffer = buffer ? `${buffer} ${sentence}` : sentence;
                        if (buffer.length >= 650) { pushChunk(buffer); buffer = ''; }
                    });
                    pushChunk(buffer);
                }
                return (chunks.length ? chunks : [normalized]).slice(0, maxItems);
            };
            const inferTaskDraftFromText = (text, sourceLabel = '外來信息', sourceUrl = '', importType = 'manual') => {

                const lower = clean.toLowerCase();

                ].filter(Boolean).join('<br>');
                return {

                    currentStatus: '備選項目：待管理員人工確認',

                    originalText: getTextPreview(clean, 3000),
                    sourceReference: [sourceUrl || sourceLabel, refs].filter(Boolean).join('｜'),

                    departments: hints.departments,

                };

            const buildCandidate = (taskDraft, meta = {}) => ({

            const summarizeTaskChange = (prevTasks, nextTasks) => {
                if (!Array.isArray(prevTasks) || !Array.isArray(nextTasks)) return { entityId: 'tasks', summary: '儲存法規清單' };
                const shortText = (value, max = 42) => {
                    const text = Array.isArray(value) ? value.join('、') : stripHtmlForText(value == null ? '' : String(value));
                    return text.length > max ? text.slice(0, max) + '…' : text;
                };
                const fieldLabels = {
                    status: '狀態', currentStatus: '現狀', progress: '執行進度/計劃', finalResult: '最終結果',
                    title: '標題', description: '簡要要求', priority: '優先級', source: '來源', departments: '涉及部門',
                    assignee: '負責人', dueDate: '預計完成日', completeDate: '實際完成日', effectiveDate: '生效日',
                    applicableRegions: '適用地區', applicableShipTypes: '適用船型', requiresMoc: 'MOC', remarks: '備註', sourceReference: '來源出處'
                };
                if (nextTasks.length > prevTasks.length) {
                    const added = nextTasks.find(n => !prevTasks.some(p => p.id === n.id));
                    return { entityId: (added && added.id) || 'tasks', summary: `新增項目 ${(added && added.id) || ''}「${(added && shortText(added.title)) || ''}」`.trim() };
                }
                if (nextTasks.length < prevTasks.length) {
                    const removed = prevTasks.find(p => !nextTasks.some(n => n.id === p.id));
                    return { entityId: (removed && removed.id) || 'tasks', summary: removed ? `刪除項目 ${removed.id}「${shortText(removed.title)}」` : `清單筆數由 ${prevTasks.length} 變更為 ${nextTasks.length}` };
                }
                for (const n of nextTasks) {
                    const oldTask = prevTasks.find(p => p.id === n.id);
                    if (!oldTask) continue;
                    if (JSON.stringify(oldTask) !== JSON.stringify(n)) {
                        const changedFields = Object.keys(n).filter(k => JSON.stringify(oldTask[k]) !== JSON.stringify(n[k]));
                        const preferred = ['status','currentStatus','progress','finalResult','title','description','priority','requiresMoc','applicableRegions','applicableShipTypes','source','departments','assignee','dueDate','effectiveDate'];
                        const ordered = [...preferred.filter(k => changedFields.includes(k)), ...changedFields.filter(k => !preferred.includes(k))];
                        const details = ordered.slice(0, 4).map(k => {
                            const label = fieldLabels[k] || k;

                            return `${label}：${shortText(oldTask[k], 20) || '空'} → ${shortText(n[k], 32) || '空'}`;
                        }).join('；');
                        return { entityId: n.id, summary: `修改項目 ${n.id}「${shortText(n.title, 24)}」：${details || '內容變更'}` };

                if (!confirm(`確定從 ${dept} 移除操作員「${name}」？`)) return;
                const next = normalizeOperatorRoster(operatorRoster);
                next[dept] = next[dept].filter(n => n !== name);
                persistOperatorRoster(next, `移除操作員 ${dept}/${name}`);
                const key = getPersonnelPasswordKey(dept, name);
                if (adminPasswords[key]) {
                    const nextPasswords = { ...adminPasswords };
                    delete nextPasswords[key];
                    persistAdminPasswords(nextPasswords, `移除管理員密碼 ${dept}/${name}`);
                }
            };

            const loadPublicCloudState = async (client) => {
                if (!client) return;
                try {
                    const { data: rows, error } = await client.from('app_state').select('key,value').in('key', ['tasks', 'candidate_items', 'message_sources', 'pdf_library', 'operator_roster', 'personnel_roles', 'personnel_admin_passwords', 'site_access_password']);
                    if (error) throw error;
                    const taskRow = (rows || []).find(r => r.key === 'tasks');
                    const candidateRow = (rows || []).find(r => r.key === 'candidate_items');
                    const sourceRow = (rows || []).find(r => r.key === 'message_sources');
                    const pdfRow = (rows || []).find(r => r.key === 'pdf_library');
                    const rosterRow = (rows || []).find(r => r.key === 'operator_roster');
                    const rolesRow = (rows || []).find(r => r.key === 'personnel_roles');
                    const adminPasswordRow = (rows || []).find(r => r.key === 'personnel_admin_passwords');
                    const passwordRow = (rows || []).find(r => r.key === 'site_access_password');
                    if (taskRow && taskRow.value && Array.isArray(taskRow.value.tasks)) {
                        const cloudTasks = normalizeTaskList(taskRow.value.tasks);
                        setTasks(cloudTasks);
                        localStorage.setItem('maritime_tasks', JSON.stringify(cloudTasks));
                    }
                    if (candidateRow && candidateRow.value && Array.isArray(candidateRow.value.items)) { const next = normalizeCandidateItems(candidateRow.value.items); setCandidateItems(next); localStorage.setItem('maritime_candidate_items', JSON.stringify(next)); }
                    if (sourceRow && sourceRow.value && Array.isArray(sourceRow.value.sources)) { const next = normalizeMessageSources(sourceRow.value.sources); setMessageSources(next); localStorage.setItem('maritime_message_sources', JSON.stringify(next)); }
                    if (pdfRow && pdfRow.value && Array.isArray(pdfRow.value.pdfs)) { const next = normalizePdfLibrary(pdfRow.value.pdfs); setPdfLibrary(next); localStorage.setItem('maritime_pdf_library', JSON.stringify(next)); }
                    if (rosterRow && rosterRow.value && rosterRow.value.roster) setOperatorRoster(normalizeOperatorRoster(rosterRow.value.roster));
                    if (rolesRow && rolesRow.value && rolesRow.value.roles) setPersonnelRoles(normalizePersonnelRoles(rolesRow.value.roles, rosterRow && rosterRow.value && rosterRow.value.roster ? rosterRow.value.roster : operatorRoster));
                    if (adminPasswordRow && adminPasswordRow.value && adminPasswordRow.value.passwords) setAdminPasswords(adminPasswordRow.value.passwords);
                    if (passwordRow && passwordRow.value && passwordRow.value.password) { setSiteAccessPassword(String(passwordRow.value.password)); setSitePasswordDraft(String(passwordRow.value.password)); }
                    setCloudStatus('Supabase 已設定：目前為操作員瀏覽模式；進行項目操作時需選擇部門與姓名。Owner/管理員請至管理中心登入。');
                } catch (err) {
                    console.warn('Public cloud load warning:', err);
                    setCloudStatus('Supabase 已設定，但未登入時無法讀取雲端公開資料；請確認已更新 supabase/schema.sql 的操作員政策。');
                }
            };

            const loadCloudState = async (client, session) => {
                if (!client || !session) return;
                setIsCloudBusy(true);
                try {
                    const email = String(session.user.email || '').toLowerCase();
                    const { data: member, error: memberError } = await client.from('app_members').select('*').eq('email', email).eq('active', true).maybeSingle();
                    if (memberError) throw memberError;
                    if (!member) {
                        setCloudMember(null);
                        setCloudRole('blocked');
                        cloudRef.current = { ...cloudRef.current, client, session, role: 'blocked', member: null };
                        setCloudStatus(`已登入 ${email}，但尚未在權限名單中；請由管理員加入 app_members。`);
                        return;
                    }
                    setCloudMember(member);
                    setCloudRole(member.role);
                    cloudRef.current = { ...cloudRef.current, client, session, role: member.role, member };
                    const { data: stateRow, error: stateError } = await client.from('app_state').select('value').eq('key', 'tasks').maybeSingle();
                    if (stateError) throw stateError;
                    if (stateRow && stateRow.value && Array.isArray(stateRow.value.tasks)) {
                        const cloudTasks = normalizeTaskList(stateRow.value.tasks);
                        setTasks(cloudTasks);
                        localStorage.setItem('maritime_tasks', JSON.stringify(cloudTasks));
                        setCloudStatus(`已載入 Supabase 雲端資料（${cloudTasks.length} 筆）。`);
                    } else if (['owner', 'admin'].includes(member.role)) {
                        const initial = normalizeTaskList(tasks);
                        await client.from('app_state').upsert({ key: 'tasks', value: { tasks: initial, updatedAt: new Date().toISOString(), version: 1 }, updated_by: session.user.id }, { onConflict: 'key' });
                        await client.from('audit_logs').insert({ actor_id: session.user.id, actor_email: email, action: 'bootstrap_tasks', entity_type: 'tasks', entity_id: 'tasks', summary: `初始化雲端資料（${initial.length} 筆）`, new_data: { count: initial.length } });
                        setCloudStatus(`已用本機資料初始化 Supabase（${initial.length} 筆）。`);
                    } else {
                        setCloudStatus('雲端尚未初始化；請管理員先上傳/同步資料。');
                    }
                    const { data: auxRows } = await client.from('app_state').select('key,value').in('key', ['candidate_items', 'message_sources', 'pdf_library']);
                    const candidateRow = (auxRows || []).find(r => r.key === 'candidate_items');
                    const sourceRow = (auxRows || []).find(r => r.key === 'message_sources');
                    const pdfRow = (auxRows || []).find(r => r.key === 'pdf_library');
                    if (candidateRow && candidateRow.value && Array.isArray(candidateRow.value.items)) { const next = normalizeCandidateItems(candidateRow.value.items); setCandidateItems(next); localStorage.setItem('maritime_candidate_items', JSON.stringify(next)); }
                    if (sourceRow && sourceRow.value && Array.isArray(sourceRow.value.sources)) { const next = normalizeMessageSources(sourceRow.value.sources); setMessageSources(next); localStorage.setItem('maritime_message_sources', JSON.stringify(next)); }
                    if (pdfRow && pdfRow.value && Array.isArray(pdfRow.value.pdfs)) { const next = normalizePdfLibrary(pdfRow.value.pdfs); setPdfLibrary(next); localStorage.setItem('maritime_pdf_library', JSON.stringify(next)); }
                    await loadAuditLogs(client);
                    await loadOperatorRoster(client);
                    const { data: rolesRow } = await client.from('app_state').select('value').eq('key', 'personnel_roles').maybeSingle();
                    if (rolesRow && rolesRow.value && rolesRow.value.roles) setPersonnelRoles(normalizePersonnelRoles(rolesRow.value.roles, operatorRoster));
                    const { data: adminPasswordRow } = await client.from('app_state').select('value').eq('key', 'personnel_admin_passwords').maybeSingle();
                    if (adminPasswordRow && adminPasswordRow.value && adminPasswordRow.value.passwords) setAdminPasswords(adminPasswordRow.value.passwords);
                    const { data: passwordRow } = await client.from('app_state').select('value').eq('key', 'site_access_password').maybeSingle();
                    if (passwordRow && passwordRow.value && passwordRow.value.password) { setSiteAccessPassword(String(passwordRow.value.password)); setSitePasswordDraft(String(passwordRow.value.password)); }
                    if (member.role === 'owner') await loadMembers(client);
                } catch (err) {
                    console.error('Supabase load error:', err);
                    setCloudStatus('Supabase 載入失敗：' + (err.message || JSON.stringify(err)));
                } finally {
                    setIsCloudBusy(false);
                }
            };

            const syncLatestFromCloud = async (silent = false) => {
                const client = cloudRef.current.client || cloudClient;
                if (!client) {
                    if (!silent) alert('尚未設定 Supabase，無法同步雲端最新內容。');
                    return false;
                }
                try {
                    const session = cloudRef.current.session || cloudSession;
                    if (session) await loadCloudState(client, session);
                    else await loadPublicCloudState(client);
                    if (!silent) alert('已同步最新雲端內容。');
                    return true;
                } catch (err) {
                    if (!silent) alert('同步最新失敗：' + (err.message || JSON.stringify(err)));
                    else console.warn('Auto sync latest failed:', err);
                    return false;
                }
            };

            useEffect(() => {
                const initSupabase = async () => {
                    const cfg = getStoredSupabaseConfig();
                    const usableCfg = isUsableSupabaseConfig(cfg);
                    setCloudConfigForm({ url: cfg.url || '', anonKey: cfg.anonKey || '' });
                    setCloudConfigEditing(!usableCfg);
                    if (!usableCfg || !window.supabase || !window.supabase.createClient) {
                        setCloudStatus('本地模式：尚未設定 Supabase，GitHub Pages 可顯示頁面，但多人權限/LOG 需完成 Supabase 設定。');
                        setIsLoading(false);
                        return;
                    }
                    setIsLoading(true);
                    try {
                        const client = window.supabase.createClient(cfg.url, cfg.anonKey, { auth: { persistSession: true, autoRefreshToken: true } });
                        setCloudClient(client);
                        cloudRef.current = { ...cloudRef.current, client };
                        const { data: { session } } = await client.auth.getSession();
                        setCloudSession(session || null);
                        if (session) await loadCloudState(client, session);
                        else await loadPublicCloudState(client);
                        const { data: sub } = client.auth.onAuthStateChange((_event, newSession) => {
                            setCloudSession(newSession || null);
                            if (newSession) loadCloudState(client, newSession);
                            else {
                                setCloudMember(null);
                                setCloudRole('local');
                                cloudRef.current = { ...cloudRef.current, session: null, role: 'local', member: null };
                                setCurrentOperator(null);
                                loadPublicCloudState(client);
                            }
                        });
                        return () => sub && sub.subscription && sub.subscription.unsubscribe();
                    } catch (err) {
                        console.error('Supabase init error:', err);
                        setCloudStatus('Supabase 初始化失敗：' + (err.message || JSON.stringify(err)));
                    } finally {
                        setIsLoading(false);
                    }
                };
                initSupabase();
            }, []);

            useEffect(() => {
                if (!siteUnlocked || !cloudClient) return;
                syncLatestFromCloud(true);
                const syncOnFocus = () => syncLatestFromCloud(true);
                const syncOnVisible = () => { if (document.visibilityState === 'visible') syncLatestFromCloud(true); };
                window.addEventListener('focus', syncOnFocus);
                document.addEventListener('visibilitychange', syncOnVisible);
                const timer = setInterval(() => syncLatestFromCloud(true), 60000);
                return () => {
                    window.removeEventListener('focus', syncOnFocus);
                    document.removeEventListener('visibilitychange', syncOnVisible);
                    clearInterval(timer);
                };
            }, [siteUnlocked, cloudClient, cloudSession]);

            const openOperatorIdentityModal = (actionLabel, retryCallback) => {
                const normalizedRoster = normalizeOperatorRoster(operatorRoster);
                if (countOperatorRosterNames(normalizedRoster) === 0) {
                    alert('尚未設定操作員預設名單。請 Owner/管理員先到「管理中心」維護操作員名單。');
                    return false;
                }
                const firstDept = DEPARTMENTS.find(d => (normalizedRoster[d] || []).length > 0) || DEPARTMENTS[0];
                setOperatorSelectDept(firstDept);
                setOperatorSelectName((normalizedRoster[firstDept] || [])[0] || '');
                setOperatorAdminPassword('');
                setPendingActionLabel(actionLabel || '修改項目');
                pendingMutationRef.current = retryCallback;
                setOperatorModalOpen(true);
                return false;
            };

            const confirmOperatorIdentity = () => {
                const dept = operatorSelectDept;
                const name = operatorSelectName;
                if (!dept || !name) { alert('請選擇部門與姓名。'); return; }
                if (!(operatorRoster[dept] || []).includes(name)) { alert('此姓名不在該部門操作員名單內。'); return; }
                const rosterRole = getPersonnelRole(name);
                let adminAuthenticated = false;
                if (rosterRole === 'admin') {
                    const configuredPassword = getAdminPassword(dept, name);
                    if (!configuredPassword) {
                        alert('此人員尚未設定管理員密碼，本次只會以操作員身份進入。');
                    } else if (String(operatorAdminPassword || '') !== configuredPassword) {
                        alert('管理員密碼錯誤。未完成管理員登入。');
                        return;
                    } else {
                        adminAuthenticated = true;
                    }
                }
                const op = { department: dept, name, role: adminAuthenticated ? 'admin' : 'operator', rosterRole, adminAuthenticated };
                currentOperatorRef.current = op;
                setCurrentOperator(op);
                setOperatorAdminPassword('');
                setOperatorModalOpen(false);
                const pending = pendingMutationRef.current;
                pendingMutationRef.current = null;
                if (pending) setTimeout(pending, 0);
            };

            const clearOperatorIdentity = () => {
                currentOperatorRef.current = null;
                setCurrentOperator(null);
            };

            const handleSiteUnlock = () => {
                if (String(sitePasswordInput || '').trim() === String(siteAccessPassword || DEFAULT_SITE_ACCESS_PASSWORD)) {
                    sessionStorage.setItem('maritime_site_unlocked', 'true');
                    setSiteUnlocked(true);
                    setSitePasswordError('');
                    setSitePasswordInput('');
                } else {
                    setSitePasswordError('密碼錯誤，請重新輸入。');
                }
            };

            const persistSiteAccessPassword = async () => {
                if (!canManageSupabaseMembers()) { alert('只有 Owner 可以修改進站密碼。'); return; }
                const nextPassword = String(sitePasswordDraft || '').trim();
                if (!nextPassword) { alert('密碼不可為空。'); return; }
                setSiteAccessPassword(nextPassword);
                localStorage.setItem('maritime_site_access_password', nextPassword);
                if (cloudClient && cloudSession && cloudRole === 'owner') {
                    try {
                        await cloudClient.from('app_state').upsert({ key: 'site_access_password', value: { password: nextPassword, updatedAt: new Date().toISOString(), version: 1 }, updated_by: cloudSession.user.id }, { onConflict: 'key' });
                        await cloudClient.from('audit_logs').insert({ actor_id: cloudSession.user.id, actor_email: cloudSession.user.email, action: 'update_site_password', entity_type: 'site_access_password', entity_id: 'site_access_password', summary: '更新進站密碼' });
                    } catch (err) { console.warn('Site password cloud sync warning:', err); }
                }
                alert('進站密碼已更新。');
            };

            const updatePersonnelRole = async (name, role) => {
                if (!canAdminCloud()) { alert('您無權訪問'); return; }
                const next = normalizePersonnelRoles({ ...personnelRoles, [name]: role }, operatorRoster);
                setPersonnelRoles(next);
                localStorage.setItem('maritime_personnel_roles', JSON.stringify(next));
                if (role !== 'admin') {
                    const passwordKeys = Object.keys(adminPasswords).filter(key => key.endsWith(`/${String(name || '').trim()}`));
                    if (passwordKeys.length) {
                        const nextPasswords = { ...adminPasswords };
                        passwordKeys.forEach(key => delete nextPasswords[key]);
                        persistAdminPasswords(nextPasswords, `移除非管理員密碼 ${name}`);
                    }
                }
                if (cloudClient && cloudSession && ['owner','admin'].includes(cloudRole)) {
                    try {
                        await cloudClient.from('app_state').upsert({ key: 'personnel_roles', value: { roles: next, updatedAt: new Date().toISOString(), version: 1 }, updated_by: cloudSession.user.id }, { onConflict: 'key' });
                        await cloudClient.from('audit_logs').insert({ actor_id: cloudSession.user.id, actor_email: cloudSession.user.email, action: 'update_personnel_role', entity_type: 'personnel_role', entity_id: name, summary: `設定 ${name} 權級為 ${PERSONNEL_ROLE_LABELS[role]}`, new_data: { name, role } });
                    } catch (err) { console.warn('Personnel role cloud sync warning:', err); }
                }
            };

            const requestAdminAccess = () => {
                if (canAdminCloud()) { setActiveTab('admin'); return; }
                if (currentOperatorRef.current && getEffectiveOperatorRole(currentOperatorRef.current) !== 'admin') { alert('您無權訪問；管理員需設定並輸入密碼。'); return; }
                openOperatorIdentityModal('進入管理中心', () => {
                    if (currentOperatorRef.current && getEffectiveOperatorRole(currentOperatorRef.current) === 'admin') setActiveTab('admin');
                    else alert('您無權訪問；管理員需設定並輸入密碼。');
                });
            };

            // 封裝 setTasks 以同步至雲端與本地端
            const updateTasksList = (newTasksOrCallback, actionLabel = '修改項目') => {
                if (!isPrivilegedRole() && !currentOperatorRef.current) {
                    return openOperatorIdentityModal(actionLabel, () => updateTasksList(newTasksOrCallback, actionLabel));
                }
                setTasks(prevTasks => {
                    const updatedTasks = typeof newTasksOrCallback === 'function' ? newTasksOrCallback(prevTasks) : newTasksOrCallback;
                    if (!canEditCloud()) {
                        alert('目前沒有修改權限。Owner/管理員請登入；操作員請先選擇部門與姓名。');
                        return prevTasks;
                    }
                    // 過濾掉無法序列化的 Blob 本地物件網址
                    const serializableTasks = updatedTasks.map(t => ({
                        ...t,
                        attachments: (t.attachments || []).map(a => ({ name: a.name, type: a.type }))
                    }));
                    const diff = summarizeTaskChange(prevTasks, serializableTasks);
                    // 1. 寫入 LocalStorage (避免雲端失敗時的白畫面，並確保本地也有最新備份)
                    try {
                        localStorage.setItem('maritime_tasks', JSON.stringify(serializableTasks));
                    }
                    catch (e) {
                        console.error('Local storage save error', e);
                    }
                    // 2. 若已設定 Supabase，節流寫入並留下可搜尋 LOG
                    scheduleCloudPersist(serializableTasks, diff);
                    return updatedTasks;
                });
                return true;
            };
            const persistAppStateKey = async (key, value, summary, entityType = key) => {
                if (!cloudClient || !cloudSession || !['owner','admin'].includes(cloudRole)) return;
                try {
                    const actor = cloudSession.user;
                    const { error: stateError } = await cloudClient.from('app_state').upsert({
                        key,
                        value: { ...value, updatedAt: new Date().toISOString(), version: 1 },
                        updated_by: actor.id,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'key' });
                    if (stateError) throw stateError;
                    await cloudClient.from('audit_logs').insert({
                        actor_id: actor.id,
                        actor_email: actor.email,
                        action: `save_${key}`,
                        entity_type: entityType,
                        entity_id: key,
                        summary,
                        new_data: value
                    });
                    if (activeTab === 'admin') loadAuditLogs();
                } catch (err) {
                    console.warn(`Save ${key} warning:`, err);
                    setCloudStatus(`${key} 雲端保存失敗：` + (err.message || JSON.stringify(err)));
                }
            };
            const updateCandidateItems = (updater, summary = '更新備選項目') => {
                if (!canAdminCloud()) return openOperatorIdentityModal(summary, () => updateCandidateItems(updater, summary));
                setCandidateItems(prev => {
                    const next = normalizeCandidateItems(typeof updater === 'function' ? updater(prev) : updater);
                    localStorage.setItem('maritime_candidate_items', JSON.stringify(next));
                    persistAppStateKey('candidate_items', { items: next, count: next.length }, summary, 'candidate_items');
                    return next;
                });
                return true;
            };
            const updateMessageSources = (updater, summary = '更新消息源') => {
                if (!canAdminCloud()) return openOperatorIdentityModal(summary, () => updateMessageSources(updater, summary));
                setMessageSources(prev => {
                    const next = normalizeMessageSources(typeof updater === 'function' ? updater(prev) : updater);
                    localStorage.setItem('maritime_message_sources', JSON.stringify(next));
                    persistAppStateKey('message_sources', { sources: next, count: next.length }, summary, 'message_sources');
                    return next;
                });
                return true;
            };
            const updatePdfLibrary = (updater, summary = '更新 PDF 資料') => {
                if (!canAdminCloud()) return openOperatorIdentityModal(summary, () => updatePdfLibrary(updater, summary));
                setPdfLibrary(prev => {
                    const next = normalizePdfLibrary(typeof updater === 'function' ? updater(prev) : updater);
                    localStorage.setItem('maritime_pdf_library', JSON.stringify(next));
                    persistAppStateKey('pdf_library', { pdfs: next, count: next.length }, summary, 'pdf_library');
                    return next;
                });
                return true;
            };

            // 所有年份選項 (從資料中提取)
            const allYears = useMemo(() => {
                const yrs = new Set(tasks.map(t => t.effectiveDate ? String(t.effectiveDate).substring(0, 4) : '').filter(Boolean));
                return Array.from(yrs).sort();
            }, [tasks]);
            // --- 統計計算：計算頁籤標籤的數量 ---
            const tabCounts = useMemo(() => {
                return {
                    all: tasks.length,
                    candidates: candidateItems.length,
                    sources: messageSources.length,
                    pdfs: pdfLibrary.length,
                    status_list: tasks.length,
                    in_progress: tasks.filter(t => t.status === 'in_progress' && !getPriorityArr(t.priority).some(p => ['不適用', '暫不適用定期複查'].includes(p))).length,
                    completed: tasks.filter(t => t.status === 'completed').length,
                    temp_na: tasks.filter(t => getPriorityArr(t.priority).includes('暫不適用定期複查')).length,
                    na: tasks.filter(t => getPriorityArr(t.priority).includes('不適用')).length
                };
            }, [tasks]);
            // --- 統計計算：依據目前頁籤，計算優先級的件數 ---
            const priorityCounts = useMemo(() => {
                const counts = {};
                PRIORITIES.forEach(p => counts[p] = 0);
                // 使用與清單相同的過濾基礎邏輯來統計該頁籤下的優先級數量
                const baseTasks = tasks.filter(task => {
                    if (activeTab === 'in_progress' && (task.status !== 'in_progress' || getPriorityArr(task.priority).some(p => ['暫不適用定期複查', '不適用'].includes(p))))
                        return false;
                    if (activeTab === 'completed' && task.status !== 'completed')
                        return false;
                    if (activeTab === 'temp_na' && !getPriorityArr(task.priority).includes('暫不適用定期複查'))
                        return false;
                    if (activeTab === 'na' && !getPriorityArr(task.priority).includes('不適用'))
                        return false;
                    return true;
                });
                baseTasks.forEach(t => {
                    getPriorityArr(t.priority).forEach(p => {
                        if (counts[p] !== undefined)
                            counts[p]++;
                    });
                });
                return counts;
            }, [tasks, activeTab]);
            // 切換暗黑模式
            useEffect(() => {
                if (isDark)
                    document.documentElement.classList.add('dark');
                else
                    document.documentElement.classList.remove('dark');
            }, [isDark]);
            useEffect(() => {
                const handleClickOutside = () => { setOpenDropdownId(null); setThemeDropdownOpen(false); };
                window.addEventListener('click', handleClickOutside);
                return () => window.removeEventListener('click', handleClickOutside);
            }, []);
            const updateTask = (id, field, value) => {
                updateTasksList(prev => prev.map(task => task.id === id ? { ...task, [field]: value } : task), `修改項目 ${id}`);
            };
            const toggleArrayField = (id, field, value) => {
                updateTasksList(prev => prev.map(task => {
                    if (task.id === id) {
                        const currentArr = Array.isArray(task[field]) ? task[field] : (task[field] ? [task[field]] : []);
                        const newArr = currentArr.includes(value) ? currentArr.filter(v => v !== value) : [...currentArr, value];
                        return { ...task, [field]: newArr };
                    }
                    return task;
                }), `修改項目 ${id}`);
            };
            const toggleFilter = (filterKey, value) => {
                setFilters(prev => {
                    const current = prev[filterKey];
                    const newFilter = current.includes(value) ? current.filter(v => v !== value) : [...current, value];
                    return { ...prev, [filterKey]: newFilter };
                });
            };
            const toggleRowExpanded = (id) => {
                setExpandedRows(prev => {
                    const next = new Set(prev);
                    if (next.has(id))
                        next.delete(id);
                    else
                        next.add(id);
                    return next;
                });
            };
            // 標記完成相關邏輯
            const openCompleteModal = (task) => {

            const fetchMessageSource = async (source) => {

                    const contentType = response.headers.get('content-type') || '';
                    const html = await response.text();
                    const info = extractPageInfo(html, source.url);
                    const looksLikeFeed = /rss|atom|xml/i.test(contentType) || /^\s*<\?xml/i.test(html) || /<rss\b|<feed\b/i.test(html.slice(0, 1000));
                    const feedItems = looksLikeFeed ? extractFeedItems(html, source.url) : [];
                    const pdfLinks = extractPdfLinksFromHtml(html, source.url);
                    const articleLinks = feedItems.length ? [] : extractArticleLinksFromHtml(html, source.url);
                    let totalAdded = 0;
                    let totalSkipped = 0;
                    const addResult = (result) => { totalAdded += result.added || 0; totalSkipped += result.skipped || 0; };

                    if (feedItems.length) {
                        feedItems.slice(0, 15).forEach(item => addResult(addCandidatesFromText(`${item.title}\n${item.date || ''}\n${item.description || ''}\n${item.link || ''}`, {
                            importType: 'source',

                            notes: '由 RSS/Atom 消息源條目建立。',

                        })));

                        articleLinks.slice(0, 8).forEach(link => addResult(addCandidatesFromText(makeCandidateTextFromLink(link, source.name), {

                        })));
                    }

                    const existingPdfKeys = new Set((pdfLibrary || []).map(item => normalizeImportKey(item.url || item.title || '')));
                    const uniquePdfLinks = pdfLinks.filter(link => !existingPdfKeys.has(normalizeImportKey(link.url)));
                    let addedPdfCount = 0;
                    if (uniquePdfLinks.length) {
                        const ok = updatePdfLibrary(prev => {
                            const seen = new Set((prev || []).map(item => normalizeImportKey(item.url || item.title || '')));
                            const additions = uniquePdfLinks.filter(link => {
                                const key = normalizeImportKey(link.url);
                                if (!key || seen.has(key)) return false;
                                seen.add(key);
                                return true;
                            }).map(link => ({
                                id: `PDF-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`,

                                url: link.url,

                            }));
                            addedPdfCount = additions.length;

                    const summary = `已抓取：新增 ${totalAdded} 筆備選，略過 ${totalSkipped} 筆疑似重複；發現 PDF ${pdfLinks.length} 個，新增 PDF 紀錄 ${addedPdfCount} 個，略過 ${skippedPdfCount} 個；${feedItems.length ? `RSS/Atom 條目 ${feedItems.length} 筆` : `公告/通函連結 ${articleLinks.length} 個`}。`;
                    updateMessageSources(prev => prev.map(item => item.id === source.id ? { ...item, lastCheckedAt: new Date().toISOString(), lastResult: summary } : item), `更新消息源 ${source.name}`);
                    setSourceStatus(`「${source.name}」${summary}`);
                } catch (err) {

                    updateMessageSources(prev => prev.map(item => item.id === source.id ? { ...item, lastCheckedAt: new Date().toISOString(), lastResult: msg } : item), `消息源抓取失敗 ${source.name}`);

            const ensurePdfJs = () => {

            const extractPdfArrayBuffer = async (arrayBuffer, label, sourceUrl = '') => {
                const pdfjs = ensurePdfJs();

                const pdf = await pdfjs.getDocument({ data: arrayBuffer }).promise;
                const pages = [];
                for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
                    const page = await pdf.getPage(pageNumber);
                    const content = await page.getTextContent();
                    const text = content.items.map(item => item.str || '').join(' ');
                    pages.push(`--- Page ${pageNumber} ---\n${text}`);
                }
                const fullText = pages.join('\n\n');
                setPdfTextPreview(getTextPreview(fullText, 3000));
                const result = addCandidatesFromText(fullText, { importType: 'pdf', importSource: label, sourceUrl, notes: `PDF 自動讀取 ${pdf.numPages} 頁；需人工核對頁碼、來源與適用範圍。`, maxItems: Math.min(15, Math.max(1, pdf.numPages)) });
                if (fullText.replace(/\s+/g, '').length < 80) {
                    setPdfStatus(`PDF 已讀取 ${pdf.numPages} 頁，但可抽取文字很少；可能是掃描件，需要 OCR。`);
                } else {
                    setPdfStatus(`已讀取 ${pdf.numPages} 頁，新增 ${result.added} 筆備選，略過 ${result.skipped} 筆疑似重複。`);
                }
                return { fullText, pages: pdf.numPages, ...result };
            };
            const handlePdfFileImport = async (event) => {

                } catch (err) {

                    }));
                    const ws = XLSX.utils.json_to_sheet(dataToExport);
                    const range = XLSX.utils.decode_range(ws['!ref']);
                    for (let R = range.s.r; R <= range.e.r; ++R) {
                        for (let C = range.s.c; C <= range.e.c; ++C) {
                            const cellAddress = XLSX.utils.encode_cell({ r: R, c: C });
                            if (!ws[cellAddress])
                                continue;
                            if (R === 0) {
                                ws[cellAddress].s = {
                                    font: { bold: true, color: { rgb: "FFFFFF" } },
                                    fill: { fgColor: { rgb: "4F81BD" } },
                                    alignment: { horizontal: "center", vertical: "center", wrapText: true },

                                };
                            }
                            else {
                                ws[cellAddress].s = {
                                    alignment: { vertical: "top", wrapText: true },
                                    border: { top: { style: 'thin' }, bottom: { style: 'thin' }, left: { style: 'thin' }, right: { style: 'thin' } }
                                };
